version: '3'
services:
  # Kafka 伺服器 (使用 KRaft 模式，不需要 Zookeeper)
  kafka:
    image: apache/kafka:latest
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,INTERNAL://:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      # 預設值為 3 ，至少要有在 3 台 Broker 上存檔
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # 預設值為 2 ，當 Producer 使用 acks=all 時，ISR 名單內至少要有幾個人
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      # 預設 30000ms ， 通常夠用，一個 Follower 在設定時間內，沒有跟上 Leader 的最新 Offset，或者沒向 Leader 發送同步請求，
      # Leader 就會把他從 ISR 踢出
      KAFKA_REPLICA_LAG_TIME_MAX_MS: 30000
      # 資料保存時間，預設 7 天 (168 小時)
      KAFKA_LOG_RETENTION_HOURS: 168
      # 資料保存容量，預設 -1 (不限制)
      KAFKA_LOG_RETENTION_BYTES: -1
      # 墓碑訊息保留時間，預設 24 小時
      KAFKA_LOG_CLEANER_DELETE_RETENTION_MS: 86400000

  # Kafka UI 圖形化介面
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-cluster
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
    depends_on:
      - kafka